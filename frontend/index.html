<!DOCTYPE html>
<html>
<head>
    <title>Marks Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎯 Student Marks Predictor</h1>

<div class="form-group">
    <label>Study Hours</label>
    <input id="study" type="number">
</div>

<div class="form-group">
    <label>Attendance (%)</label>
    <input id="attendance" type="number">
</div>

<div class="form-group">
    <label>Previous Marks</label>
    <input id="previous" type="number">
</div>

<div class="form-group">
    <label>Sleep Hours</label>
    <input id="sleep" type="number">
</div>

<input type="number" id="marks" placeholder="Enter marks">
<button onclick="predictMarks()">Predict</button>

<p id="result"></p>

</div>

<script>
function predictMarks() {
    let marks = document.getElementById("marks").value;

    fetch("https://your-backend.vercel.app/predict", {  // ✅ HERE
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            marks: marks
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            data.prediction;
    })
    .catch(err => console.log(err));
}
</script>

</body>
</html>
